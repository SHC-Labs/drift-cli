# goreleaser config for drift v1. Cross-compiles to 5 OS-arch targets,
# emits checksums + cosign signatures + SLSA-3 attestation, publishes
# to GitHub Releases + Homebrew tap. Authenticode signing on Windows
# and Apple notarization on macOS land once the certs are procured.
#
# Run locally: `goreleaser release --snapshot --clean` (no publishing).
# Run in CI: tagged push triggers .github/workflows/release.yml.

version: 2

project_name: drift

before:
  hooks:
    - go mod tidy

builds:
  - id: drift
    main: ./cmd/drift
    binary: drift
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid=
      - -X github.com/SHC-Labs/drift/internal/version.Version={{.Version}}
      - -X github.com/SHC-Labs/drift/internal/version.Commit={{.ShortCommit}}
      - -X github.com/SHC-Labs/drift/internal/version.BuildDate={{.CommitDate}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows ARM64 deferred to v1.x. Customers on Windows ARM64 are
      # rare; add when there's actual demand.
      - goos: windows
        goarch: arm64

archives:
  - id: drift
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - PRIVACY.md
      - SECURITY.md

# Upload the bootstrap scripts as standalone release assets so the
# install URL on mcp.driftlabs.io can redirect customers to a stable
# location. Reachable at:
#   https://github.com/SHC-Labs/drift-cli/releases/latest/download/install.sh
#   https://github.com/SHC-Labs/drift-cli/releases/latest/download/install.ps1
release:
  extra_files:
    - glob: scripts/install.sh
    - glob: scripts/install.ps1

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: '{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}'

changelog:
  disable: true  # CHANGELOG.md is hand-curated, see DEPRECATION.md policy

# Future additions (cert procurement + post-launch demand):
# - signs[]: cosign keyless OIDC signing (re-enable when CI runner has
#   cosign-installer and we want SLSA-3 attestation; first release just
#   ships checksums.txt as the trust anchor)
# - sboms[]: syft SBOM emission alongside each archive
# - notarize: Apple notarization once DEVELOPER_ID_APPLICATION cert lands
# - signs[]: Authenticode for Windows .exe (separate signtool step)
# - brews: Homebrew tap auto-publish to SHC-Labs/homebrew-drift (tap
#   repo + GH_PAT secret needed first)
# - winget: Winget manifest auto-submission (cross-repo PR; needs GH_PAT)
# - nfpms: .deb / .rpm packages for APT / DNF distribution
# - scoops: Scoop bucket for Windows power users
