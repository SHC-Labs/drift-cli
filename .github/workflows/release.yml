# Tagged release pipeline. Cross-compiles, archives, uploads to GitHub
# Releases. Triggered by `git tag vX.Y.Z && git push --tags`.
#
# v0.1.0 ships unsigned archives + checksums.txt as the trust anchor.
# Cosign keyless signing, SLSA-3 provenance, Homebrew tap, and Winget
# auto-submission re-enable in subsequent releases once the supporting
# infrastructure is in place.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
