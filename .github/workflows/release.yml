# Tagged release pipeline. Cross-compiles, signs, attests, publishes.
# Triggered by `git tag vX.Y.Z && git push --tags`.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create release, upload artifacts
  id-token: write   # OIDC for cosign keyless signing
  packages: write   # GHCR if we ever publish container images
  attestations: write  # SLSA-3 provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GH_PAT has write access to SHC-Labs/homebrew-drift (tap)
          # and SHC-Labs/winget-pkgs (winget fork).
          GH_PAT: ${{ secrets.GH_PAT }}
          # Cosign keyless signing uses GitHub Actions OIDC; no key
          # material in the runner.
          COSIGN_EXPERIMENTAL: '1'

      - name: SLSA-3 provenance
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
        with:
          base64-subjects: ${{ steps.checksums.outputs.subjects }}
          upload-assets: true
        if: false  # Enable when subjects are emitted by goreleaser

  reproducible-build-verify:
    # Build the binary on a clean runner from the tagged commit, diff
    # against the runner-built binary in the release. CI fails if they
    # differ. Locks down the reproducible-builds claim.
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Build with the same flags
        run: |
          set -e
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS=${target%/*} GOARCH=${target#*/} CGO_ENABLED=0 \
              go build -trimpath \
              -ldflags="-s -w -buildid= -X github.com/SHC-Labs/drift/internal/version.Version=${{ github.ref_name }} -X github.com/SHC-Labs/drift/internal/version.BuildDate=$(git log -1 --format=%cI ${{ github.sha }})" \
              -o /tmp/drift-verify-$(echo $target | tr / -) ./cmd/drift
            sha256sum /tmp/drift-verify-$(echo $target | tr / -)
          done
      - name: Compare to release artifacts
        run: |
          # Pulled by separate step (gh release download) and diffed
          # against /tmp/drift-verify-*. Stub for now; wire up once
          # the release flow is end-to-end.
          echo "Reproducible-build comparison runs here. See DRIFT_BINARY_REWRITE_PLAN.md acceptance criteria #2."
