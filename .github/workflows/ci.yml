# CI for the drift binary. Build + test + cross-compile + shell-injection
# grep guard. Reproducible-build verification, fuzz testing, and the
# cosign / SLSA release pipeline live in release.yml (triggered on tag).

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...
      - name: No shell injection
        # Hook code never shells out. exec.Command(name, args...) only.
        # Never exec.Command("sh", "-c", "<interpolated>"). See SECURITY.md.
        run: |
          if grep -rn 'exec.Command.*sh.*-c' --include='*.go' .; then
            echo "Found shell injection pattern; use exec.Command(name, args...) instead"
            exit 1
          fi

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Debug environment
        run: |
          set -x
          go version
          which go
          go env GOROOT GOPATH
          ls cmd/drift/
      - name: Cross-compile linux amd64
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -buildid=" -o /tmp/drift-linux-amd64 ./cmd/drift
      - name: Cross-compile linux arm64
        run: GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -buildid=" -o /tmp/drift-linux-arm64 ./cmd/drift
      - name: Cross-compile darwin amd64
        run: GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -buildid=" -o /tmp/drift-darwin-amd64 ./cmd/drift
      - name: Cross-compile darwin arm64
        run: GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -buildid=" -o /tmp/drift-darwin-arm64 ./cmd/drift
      - name: Cross-compile windows amd64
        run: GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -buildid=" -o /tmp/drift-windows-amd64 ./cmd/drift
