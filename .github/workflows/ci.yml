# CI for the drift binary. Build + test + cross-compile + shell-injection
# grep guard. Reproducible-build verification, fuzz testing, and the
# cosign / SLSA release pipeline live in release.yml (triggered on tag).

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...
      - name: No shell injection
        # Hook code never shells out. exec.Command(name, args...) only.
        # Never exec.Command("sh", "-c", "<interpolated>"). See SECURITY.md.
        run: |
          if grep -rn 'exec.Command.*sh.*-c' --include='*.go' .; then
            echo "Found shell injection pattern; use exec.Command(name, args...) instead"
            exit 1
          fi

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Cross-compile matrix
        run: bash ./scripts/ci-cross-compile.sh > /tmp/xcompile.log 2>&1
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcompile-log
          path: /tmp/xcompile.log
          if-no-files-found: warn
